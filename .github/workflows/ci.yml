name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --workspaces --include-workspace-root

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Test
        run: npm test --workspaces --if-present

      - name: Build (bridge + web + types)
        run: npm run build

      - name: Emit OpenAPI (sanity-check it's still valid)
        run: npm run openapi:emit -w @rehau/bridge

  docker:
    name: docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: rehau-bridge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test
        run: |
          docker run -d --name rehau-bridge-ci \
            -p 8080:8080 \
            -e DEVICE_URL=http://10.0.0.1 \
            -e DEVICE_MODE=mock \
            -e JWT_SECRET=ci-secret-aaaaaaaaaaaaaaaaaaaa \
            -e API_USER=admin \
            -e 'API_PASSWORD_HASH=$2b$12$9SH0uVeFX0PQhkWl/v/jDuL2RVxJHkSxmMR3pBgsZEtT/2CyD.97G' \
            rehau-bridge:ci
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8080/healthz >/dev/null; then
              echo "bridge alive"
              exit 0
            fi
            sleep 2
          done
          docker logs rehau-bridge-ci
          exit 1
